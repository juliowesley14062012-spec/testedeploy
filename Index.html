<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <meta http-equiv="Content-Language" content="pt-br" />
    <title id="page-title">Sistema de Agendamento</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  </head>
  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Atualiza título automaticamente
      fetch("/config.json")
        .then((r) => r.json())
        .then((config) => {
          const title = document.getElementById("page-title");
          if (title && config.barbershop?.name) {
            title.textContent = `Sistema de Agendamento - ${config.barbershop.name}`;
          }
        })
        .catch((e) => console.warn("Falha ao carregar config.json:", e));
    </script>
  </body>
</html>
