[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Força o Netlify a não usar Hugo
[build.processing]
  skip_processing = false

# Configurações adicionais para garantir que use Node.js
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"